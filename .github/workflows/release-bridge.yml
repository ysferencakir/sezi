name: Publish Bridge APK

on:
  push:
    branches: [main]
    paths:
      - "bridge-android/app/**"
      - "bridge-android/build.gradle.kts"
      - "bridge-android/settings.gradle.kts"
      - "bridge-android/gradle.properties"
      - ".github/workflows/release-bridge.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "İsteğe bağlı sürüm (ör. 0.3.0); boşsa otomatik üretilir"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: bridge-release
  cancel-in-progress: false

jobs:
  release:
    name: Sign and publish release APK
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate signing secrets
        shell: bash
        run: |
          missing=0
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        shell: bash
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.11.1"

      - name: Generate Gradle wrapper if missing
        working-directory: bridge-android
        shell: bash
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x ./gradlew

      - name: Resolve release version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          version="${REQUESTED_VERSION:-}"
          if [ -z "$version" ]; then
            version="0.2.${GITHUB_RUN_NUMBER}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $version"
            exit 1
          fi
          version_code=$((2000 + GITHUB_RUN_NUMBER))
          echo "name=$version" >> "$GITHUB_OUTPUT"
          echo "code=$version_code" >> "$GITHUB_OUTPUT"
          echo "tag=bridge-v$version" >> "$GITHUB_OUTPUT"

      - name: Restore release keystore
        shell: bash
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sezi-release.jks"
          chmod 600 "$RUNNER_TEMP/sezi-release.jks"

      - name: Build signed release APK
        working-directory: bridge-android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/sezi-release.jks
          SEZI_VERSION_NAME: ${{ steps.version.outputs.name }}
          SEZI_VERSION_CODE: ${{ steps.version.outputs.code }}
        shell: bash
        run: |
          # Secret'lar panodan yapistirilirken gorunmez unicode karakterler
          # bulasabiliyor ("Password is not ASCII"); yazdirilabilir ASCII disini ayikla.
          export ANDROID_KEYSTORE_PASSWORD=$(printf '%s' "$ANDROID_KEYSTORE_PASSWORD" | tr -cd '\41-\176')
          export ANDROID_KEY_PASSWORD=$(printf '%s' "$ANDROID_KEY_PASSWORD" | tr -cd '\41-\176')
          export ANDROID_KEY_ALIAS=$(printf '%s' "$ANDROID_KEY_ALIAS" | tr -cd '\41-\176')
          ./gradlew assembleRelease --no-daemon

      - name: Verify signature and prepare release files
        id: apk
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.name }}
        run: |
          source_apk="bridge-android/app/build/outputs/apk/release/app-release.apk"
          release_apk="sezi-bridge-v${VERSION}.apk"
          test -f "$source_apk"
          cp "$source_apk" "$release_apk"
          # apksigner build-tools içindedir, runner PATH'inde olmayabilir
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          command -v apksigner >/dev/null 2>&1 && APKSIGNER=apksigner
          "$APKSIGNER" verify --verbose --print-certs "$release_apk"
          sha256sum "$release_apk" > "${release_apk}.sha256"
          echo "path=$release_apk" >> "$GITHUB_OUTPUT"
          echo "checksum=${release_apk}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sezi-bridge-v${{ steps.version.outputs.name }}
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.checksum }}
          retention-days: 90

      - name: Publish GitHub Release for Obtainium
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Sezi Bridge v${{ steps.version.outputs.name }}
          generate_release_notes: true
          make_latest: true
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.checksum }}
