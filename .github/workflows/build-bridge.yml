name: Build Bridge APK

on:
  push:
    branches: [main]
    paths:
      - "bridge-android/**"
      - ".github/workflows/build-bridge.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android build tools
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.11.1"

      - name: Generate Gradle wrapper
        working-directory: bridge-android
        run: gradle wrapper --gradle-version 8.11.1

      - name: Build debug APK
        working-directory: bridge-android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sezi-bridge-apk
          path: bridge-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
