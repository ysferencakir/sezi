name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # DNS bozuksa onar (2026-07-19: sunucu github.com'u cozemez hale geldi,
            # deploy'lar "Could not resolve host" ile dusuyordu). Sadece cozumleme
            # gercekten basarisizsa dokunur; saglikli kurulumda no-op.
            if ! getent hosts github.com >/dev/null 2>&1; then
              echo "DNS bozuk — mevcut resolv.conf:"; cat /etc/resolv.conf || true
              sudo rm -f /etc/resolv.conf
              printf 'nameserver 1.1.1.1\nnameserver 8.8.8.8\n' | sudo tee /etc/resolv.conf
              getent hosts github.com >/dev/null && echo "DNS onarildi"
            fi
            cd /opt/sezi
            git pull origin main
            .venv/bin/pip install -r requirements.txt
            # HEALTH_INGEST_TOKEN secret'i tanimliysa sunucudaki .env'de olmasini garanti et
            # (pydantic-settings .env'i calisma dizininden okur; satir varsa dokunulmaz)
            if [ -n "${{ secrets.HEALTH_INGEST_TOKEN }}" ]; then
              grep -q '^HEALTH_INGEST_TOKEN=' .env 2>/dev/null || echo "HEALTH_INGEST_TOKEN=${{ secrets.HEALTH_INGEST_TOKEN }}" >> .env
            fi
            sudo systemctl restart sezi
