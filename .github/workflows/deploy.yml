name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # DNS sagligi kontrolu (2026-07-19: systemd-resolved upstream'i bozuldu,
            # deploy'lar "Could not resolve host" ile dusuyordu). Deploy kullanicisinin
            # genel sudo yetkisi yok; onarim panel konsolundan root ile yapilmali:
            #   mkdir -p /etc/systemd/resolved.conf.d
            #   printf '[Resolve]\nDNS=1.1.1.1 8.8.8.8\n' > /etc/systemd/resolved.conf.d/dns.conf
            #   systemctl restart systemd-resolved
            if ! getent hosts github.com >/dev/null 2>&1; then
              echo "HATA: sunucu github.com'u cozemiyor — yukaridaki yorumda yazan onarimi konsoldan calistir."
              exit 1
            fi
            cd /opt/sezi
            git pull origin main
            .venv/bin/pip install -r requirements.txt
            # HEALTH_INGEST_TOKEN secret'i tanimliysa sunucudaki .env'de olmasini garanti et
            # (pydantic-settings .env'i calisma dizininden okur; satir varsa dokunulmaz)
            if [ -n "${{ secrets.HEALTH_INGEST_TOKEN }}" ]; then
              grep -q '^HEALTH_INGEST_TOKEN=' .env 2>/dev/null || echo "HEALTH_INGEST_TOKEN=${{ secrets.HEALTH_INGEST_TOKEN }}" >> .env
            fi
            sudo systemctl restart sezi
